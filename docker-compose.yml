# Server-side stack — run this on the box with the captures drive, not on the Pi.
# The Pi runs cat_detect directly: python -m cat_detect.main [options]
#
# Profiles:
#   (none / default)  api + auto-label          — dev mode, run frontend with: cd frontend && pnpm start
#   full              api + auto-label + frontend — production / self-contained
#
# Quick start (dev):
#   cp .env.example .env   # edit to taste
#   docker compose up -d
#   cd frontend && pnpm start
#
# Full stack (no local Node):
#   docker compose --profile full up -d

services:
  api:
    build:
      context: ./backend
      dockerfile: CatCam.Api/Dockerfile
    environment:
      Captures__Directory: /captures
      Stream__Url: ${STREAM_URL:-}
      Pi__MetricsUrl: ${PI_METRICS_URL:-}
      AutoLabel__Url: ${AUTOLABEL_URL:-http://auto-label:8090}
    volumes:
      - ${CAPTURES_DIR:-./captures}:/captures
    ports:
      - "${API_PORT:-5077}:8080"
    restart: unless-stopped

  # GPU service — pre-draws bounding boxes for the annotation UI.
  # Requires nvidia-container-toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
  # On first start, downloads yolov8x-worldv2.pt (~137 MB) into ./models/ and keeps it there.
  auto-label:
    build:
      context: ./auto_label
    runtime: nvidia
    environment:
      AUTOLABEL_MODEL: yolov8x-worldv2.pt
      AUTOLABEL_CONF: "0.25"
      NVIDIA_VISIBLE_DEVICES: "0"
      YOLO_CONFIG_DIR: /models
    volumes:
      - ${CAPTURES_DIR:-./captures}:/captures
      - ./models:/models
    ports:
      - "8090:8090"
    restart: unless-stopped

  # GPU training service — fine-tunes both YOLOv8 and YOLOWorld on annotated snapshots.
  # Run manually: docker compose --profile train run --rm training
  # Outputs:
  #   models/trained/catcam_yolov8n_best.pt        → copy to Pi, use with --model
  #   models/trained/catcam_yolov8x-worldv2_best.pt → set AUTOLABEL_MODEL to this path
  # Env overrides: TRAIN_BASE_MODELS (comma-separated), TRAIN_EPOCHS (default 100)
  training:
    profiles: [train]
    build:
      context: ./train
    runtime: nvidia
    shm_size: '2gb'
    environment:
      BASE_MODELS: ${TRAIN_BASE_MODELS:-yolov8n.pt,yolov8x-worldv2.pt}
      EPOCHS: ${TRAIN_EPOCHS:-100}
      TRAIN_VRAM_FRACTION: ${TRAIN_VRAM_FRACTION:-0.9}
      NVIDIA_VISIBLE_DEVICES: "0"
      YOLO_CONFIG_DIR: /models
    volumes:
      - ${CAPTURES_DIR:-./captures}:/captures:ro
      - ./models:/models
      - ./datasets:/datasets

  frontend:
    profiles: [full]
    build:
      context: ./frontend
    ports:
      - "${PORT:-4200}:80"
    depends_on:
      - api
    restart: unless-stopped
